name: Cabinet
slug: cabinet
type: plugin
version: 2.0.0
description: Cabinet de suivi client — données centralisées sur Grav, accessible sur tous vos appareils
icon: briefcase
author:
  name: Nicolas Goubaux
  email: contact@goubs.net
homepage: https://github.com/ngoubaux/grav-plugin-cabinet
keywords: grav, plugin, cabinet, clients, rendez-vous, sms, agenda, flex-objects
bugs: https://github.com/ngoubaux/grav-plugin-cabinet/issues
docs: https://github.com/ngoubaux/grav-plugin-cabinet/blob/main/README.md
repository: https://github.com/ngoubaux/grav-plugin-cabinet
license: MIT

dependencies:
  - { name: grav, version: '>=1.7.0' }
  - { name: login }
  - { name: flex-objects }

form:
  validation: strict
  fields:
    changelog_btn:
      type: display
      label: Changelog
      content: '<a class="button button-small" href="#" data-remodal-target="changelog" data-remodal-changelog="/api/cabinet/changelog"><i class="fa fa-binoculars"></i> View Changelog</a>'

    enabled:
      type: toggle
      label: Statut du plugin
      highlight: 1
      default: 0
      options:
        1: Activé
        0: Désactivé
      validate:
        type: bool

    debug:
      type: toggle
      label: Mode debug (logs détaillés)
      highlight: 1
      default: 0
      options:
        1: Activé
        0: Désactivé
      validate:
        type: bool

    api_key:
      type: text
      label: Clé API externe
      help: Utilisée par Make.com ou scripts tiers. Les appareils connectés via login Grav n'en ont pas besoin.
      placeholder: votre-cle-tres-longue-et-aleatoire
      validate:
        required: true

    allowed_origin:
      type: text
      label: Origine CORS
      help: "* pour tout autoriser, ou une URL précise"
      default: '*'

    routing:
      type: section
      title: Routes
      underline: true

    route_app_base:
      type: text
      label: Slug de la page Cabinet
      help: "Route de la page Cabinet dans Grav (ex: /cabinet, /mon-espace). Doit correspondre au slug de votre page."
      default: '/cabinet'
      placeholder: '/cabinet'

    route_api_base:
      type: text
      label: Base des endpoints API
      help: "Namespace racine des endpoints REST (ex: /api/cabinet, /api/spa). Permet de compartimenter vos APIs."
      default: '/api/cabinet'
      placeholder: '/api/cabinet'

    praticien:
      type: section
      title: Praticien
      underline: true

    practitioner_name:
      type: text
      label: Nom du praticien
      help: "Affiché dans l'email de bienvenue. Laissez vide pour utiliser le nom de l'auteur du site Grav."
      placeholder: 'Jean Dupont'

    practitioner_title:
      type: text
      label: Titre / spécialité
      placeholder: 'Praticien Shiatsu'

    practitioner_phone:
      type: text
      label: Téléphone
      placeholder: '06 00 00 00 00'

    practitioner_website:
      type: text
      label: Site web
      placeholder: 'https://monsite.com'

    practitioner_booking_url:
      type: text
      label: URL de prise de rendez-vous
      help: "Lien affiché quand le client n'a pas encore de RDV planifié."
      placeholder: 'https://calendly.com/moi'

    practitioner_address_street:
      type: text
      label: Adresse (rue)
      placeholder: '1 rue de la Paix'

    practitioner_address_details:
      type: text
      label: Complément d'adresse
      placeholder: 'Bât. A – 2ème étage, porte droite'

    practitioner_address_city:
      type: text
      label: Code postal et ville
      placeholder: '75001 Paris'

    practitioner_access_code:
      type: text
      label: Code d'accès
      placeholder: '1234A'

    practitioner_first_session_price:
      type: text
      label: Tarif première séance (€)
      placeholder: '75'

    google:
      type: section
      title: Google
      underline: true

    google_oauth_client_id:
      type: text
      label: OAuth Client ID
      help: "Google Cloud Console → APIs → Identifiants → Client OAuth 2.0"
      placeholder: xxxx.apps.googleusercontent.com

    google_calendar_id:
      type: text
      label: Identifiant du calendrier Google
      help: "Paramètres du calendrier → Adresse de l'agenda. Laisser vide pour désactiver."
      placeholder: xxxx@group.calendar.google.com

    template_client_pdf:
      type: file
      label: Template PDF — fiche client
      help: "PDF vierge envoyé sur Drive lors de la création d'un client (nommé Prénom Nom.pdf). Si vide, le template intégré est utilisé."
      destination: 'user-data://cabinet/templates'
      multiple: false
      limit: 1
      accept:
        - application/pdf

    template_seance_pdf:
      type: file
      label: Template PDF — fiche séance
      help: "PDF vierge ajouté sur Drive pour chaque nouvelle séance (nommé Prénom Nom - Séance N.pdf). Si vide, le template fiche client est utilisé."
      destination: 'user-data://cabinet/templates'
      multiple: false
      limit: 1
      accept:
        - application/pdf

    drive_bilan_path:
      type: text
      label: Chemin des fiches clients sur Google Drive
      help: "Dossier Drive où est déposée la fiche vierge de chaque client (une par client, nommée Prénom Nom.pdf). Séparateur : /. Sans slash au début ni à la fin."
      placeholder: onyx/NoteAir5c/Cahiers/clients
      default: 'onyx/NoteAir5c/Cahiers/clients'


    sms:
      type: section
      title: SMS
      underline: true

    sms_enabled:
      type: toggle
      label: SMS activés
      highlight: 1
      default: 0
      options:
        1: Activé
        0: Désactivé
      validate:
        type: bool

    sms_provider:
      type: select
      label: Provider SMS
      default: smsmobileapi
      options:
        smsmobileapi: SMSMobileAPI (payant)
        simple_sms_gateway: Simple SMS Gateway (téléphone proxy)
        android_queue: Android natif — file d'attente SMS (MacroDroid ou Termux)
      help: "Choisissez le mode d'envoi SMS. android_queue écrit les SMS dans une file d'attente que votre téléphone Android récupère et envoie via MacroDroid ou Termux."

    sms_push_token:
      type: text
      label: Token provider SMS
      help: "Utilisé par SMSMobileAPI (clé API), Simple SMS Gateway (Authorization: Bearer) et Android natif (X-Api-Key dans les scripts Termux/MacroDroid). Si vide, les scripts Android utilisent la Clé API principale."
      placeholder: token-ou-cle-provider

    sms_simple_gateway_url:
      type: text
      label: URL Simple SMS Gateway
      help: "Endpoint HTTP de votre passerelle téléphone (ex: https://.../send-sms). Le payload envoyé est {to, message}."
      placeholder: https://votre-passerelle.example/send-sms

    sms_rappel_cron:
      type: text
      label: Heure d'envoi des rappels J-1
      help: "Expression cron — ex: '0 8 * * *' = tous les jours à 8h00"
      default: '0 8 * * *'
      placeholder: '0 8 * * *'

    communication:
      type: section
      title: Communication
      underline: true

    communication_google_review_url:
      type: text
      label: URL fiche Google Business (avis)
      help: "Lien utilisé dans les messages de compte-rendu pour inviter le client à laisser un avis."
      placeholder: 'https://g.page/r/XXXX/review'

    communication_template_prep_visite:
      type: textarea
      rows: 10
      label: Template SMS Préparation visite
      help: "Variables disponibles\u00a0: {{first_name}}, {{session_slot}} (ex\u00a0: ' de lundi 28 avril \u00e0 10:00'), {{preparation_link}}, {{duration}} (ex\u00a0: 1h15), {{google_review_url}}"

    communication_template_relance:
      type: textarea
      rows: 6
      label: Template SMS Relance (optionnel)
      help: "Variables: {{first_name}}, {{session_date}}, {{google_review_url}}"

    communication_template_compte_rendu:
      type: textarea
      rows: 10
      label: Template Email Compte-rendu
      help: "Variables: {{first_name}}, {{session_date}}, {{session_date_label}}, {{google_review_url}}"
