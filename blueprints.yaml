name: Cabinet
slug: cabinet
type: plugin
version: 2.0.0
description: Cabinet de suivi client — données centralisées sur Grav, accessible sur tous vos appareils
icon: briefcase
author:
  name: Nicolas Goubaux
  email: contact@goubs.net
homepage: https://github.com/ngoubaux/grav-plugin-cabinet
keywords: grav, plugin, cabinet, clients, rendez-vous, sms, agenda, flex-objects
bugs: https://github.com/ngoubaux/grav-plugin-cabinet/issues
docs: https://github.com/ngoubaux/grav-plugin-cabinet/blob/main/README.md
repository: https://github.com/ngoubaux/grav-plugin-cabinet
license: MIT

dependencies:
  - { name: grav, version: '>=1.7.0' }
  - { name: login }
  - { name: flex-objects }

form:
  validation: strict
  fields:
    tabs:
      type: tabs
      active: 1
      class: subtle

      fields:

        # TAB 1: Général
        general:
          type: tab
          title: Général
          fields:

            changelog_btn:
              type: display
              label: Changelog
              content: '<a class="button cab-changelog-btn" href="#" data-remodal-target="changelog" data-remodal-changelog="/api/cabinet/changelog"><i class="fa fa-binoculars"></i> View Changelog</a>'

            enabled:
              type: toggle
              label: Statut du plugin
              highlight: 1
              default: 0
              options:
                1: Activé
                0: Désactivé
              validate:
                type: bool

            debug:
              type: toggle
              label: Mode debug (logs détaillés)
              highlight: 1
              default: 0
              options:
                1: Activé
                0: Désactivé
              validate:
                type: bool

            api_key:
              type: text
              label: Clé API externe
              help: Utilisée par Make.com ou scripts tiers. Les appareils connectés via login Grav n'en ont pas besoin.
              placeholder: votre-cle-tres-longue-et-aleatoire
              validate:
                required: true

            allowed_origin:
              type: text
              label: Origine CORS
              help: "* pour tout autoriser, ou une URL précise"
              default: '*'

        # TAB 2: Routes
        routes:
          type: tab
          title: Routes
          fields:

            route_app_base:
              type: text
              label: Slug de la page Cabinet
              help: "Route de la page Cabinet dans Grav (ex: /cabinet, /mon-espace). Doit correspondre au slug de votre page."
              default: '/cabinet'
              placeholder: '/cabinet'

            route_api_base:
              type: text
              label: Base des endpoints API
              help: "Namespace racine des endpoints REST (ex: /api/cabinet, /api/spa). Permet de compartimenter vos APIs."
              default: '/api/cabinet'
              placeholder: '/api/cabinet'

        # TAB 3: Système
        system:
          type: tab
          title: Système
          fields:

            practitioner_notice:
              type: display
              label: Configuration praticien
              content: "Les paramètres praticien (Google, SMS provider, templates de communication, coordonnées) sont configurés dans l'application Cabinet, via le profil utilisateur connecté."

            templates_notice:
              type: display
              label: Templates PDF des bilans
              content: "Les templates PDF fiche client / fiche séance sont maintenant définis au niveau praticien, dans Paramètres > Google (profil Cabinet)."

            sms_section:
              type: section
              title: Scheduler SMS global
              underline: true

            sms_enabled:
              type: toggle
              label: Activation globale du scheduler SMS
              highlight: 1
              default: 0
              options:
                1: Activé
                0: Désactivé
              validate:
                type: bool

            sms_rappel_cron:
              type: text
              label: Heure d'envoi des rappels J-1
              help: "Expression cron — ex: '0 8 * * *' = tous les jours à 8h00"
              default: '0 8 * * *'
              placeholder: '0 8 * * *'
