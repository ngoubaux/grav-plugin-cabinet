<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#be011d" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#18181b" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cabinet">
<link rel="manifest" href="/cabinet/manifest.json">
<title>Cabinet — Nicolas Goubaux</title>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
@font-face{font-family:'Inter var';font-style:normal;font-weight:100 900;font-display:swap;src:url('/user/themes/goubs-net/fonts/Inter-roman.var.woff2') format('woff2')}

:root{
  --cab-accent:#be011d;
  --cab-accent-hover:#a0011a;
  --cab-accent-fg:#fff;
  --cab-bg:#ffffff;
  --cab-surface:#f4f4f5;
  --cab-surface-alt:#ececed;
  --cab-border:#e4e4e7;
  --cab-text:#3f3f46;
  --cab-text-sec:#71717a;
  --cab-text-dim:#a1a1aa;
  --cab-overlay-bg:rgba(0,0,0,.45);
  --cab-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
}
:root.dark{
  --cab-accent:#e0334d;
  --cab-accent-hover:#be011d;
  --cab-accent-fg:#fff;
  --cab-bg:#18181b;
  --cab-surface:#27272a;
  --cab-surface-alt:#3f3f46;
  --cab-border:#3f3f46;
  --cab-text:#e4e4e7;
  --cab-text-sec:#a1a1aa;
  --cab-text-dim:#71717a;
  --cab-overlay-bg:rgba(0,0,0,.65);
  --cab-shadow:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter var',Inter,system-ui,sans-serif;color:var(--cab-text);background:var(--cab-surface);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:16px;transition:background .2s,color .2s}
.app{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 32px);width:100%;max-width:1200px;border:1px solid var(--cab-border);border-radius:12px;overflow:hidden;background:var(--cab-bg);box-shadow:var(--cab-shadow)}
.sidebar{background:var(--cab-surface);border-right:1px solid var(--cab-border);display:flex;flex-direction:column}
.sidebar-head{padding:14px 16px;border-bottom:1px solid var(--cab-border);display:flex;align-items:center;justify-content:space-between}
.sidebar-title{font-size:13px;font-weight:500}
.btn-add{background:var(--cab-accent);color:var(--cab-accent-fg);border:none;border-radius:8px;padding:5px 10px;font-size:12px;font-weight:500;cursor:pointer;transition:background .15s}
.btn-add:hover{background:var(--cab-accent-hover)}
.search-wrap{padding:10px 12px;border-bottom:1px solid var(--cab-border)}
.search-wrap input{width:100%;font-size:13px;padding:6px 10px;border-radius:8px;border:1px solid var(--cab-border);background:var(--cab-bg);color:var(--cab-text);font-family:inherit;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:var(--cab-accent)}
.client-list{flex:1;overflow-y:auto}
.client-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--cab-border);transition:background .12s}
.client-item:hover{background:var(--cab-surface-alt)}
.client-item.active{background:var(--cab-surface-alt);border-left:3px solid var(--cab-accent)}
.client-name{font-size:13px;font-weight:500}
.client-meta{font-size:11px;color:var(--cab-text-sec);margin-top:2px}
.client-badge{display:inline-block;background:color-mix(in srgb,var(--cab-accent) 10%,transparent);color:var(--cab-accent);font-size:10px;padding:1px 6px;border-radius:20px;border:1px solid color-mix(in srgb,var(--cab-accent) 25%,transparent);margin-top:3px}
.main{background:var(--cab-bg);display:flex;flex-direction:column}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--cab-text-sec);gap:8px}
.main-tabs{display:flex;border-bottom:1px solid var(--cab-border);background:var(--cab-surface)}
.tab{padding:10px 14px;font-size:13px;cursor:pointer;color:var(--cab-text-sec);border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.tab:hover{color:var(--cab-text)}
.tab.active{color:var(--cab-accent);border-bottom-color:var(--cab-accent);background:var(--cab-bg)}
.main-body{flex:1;overflow-y:auto;padding:20px}
.section-label{font-size:11px;font-weight:600;color:var(--cab-text-sec);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;color:var(--cab-text-sec)}
.field input,.field textarea,.field select{font-size:13px;padding:7px 10px;border-radius:8px;border:1px solid var(--cab-border);background:var(--cab-bg);color:var(--cab-text);resize:none;font-family:inherit;outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--cab-accent)}
.field textarea{min-height:70px}
.field-full{grid-column:1/-1}
.btn-save{background:var(--cab-accent);color:var(--cab-accent-fg);border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:500;cursor:pointer;margin-top:4px;transition:background .15s}
.btn-save:hover{background:var(--cab-accent-hover)}
.btn-ghost{background:transparent;color:var(--cab-text-sec);border:1px solid var(--cab-border);border-radius:8px;padding:7px 14px;font-size:13px;cursor:pointer;transition:background .15s,color .15s}
.btn-ghost:hover{background:var(--cab-surface);color:var(--cab-text)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--cab-surface);border-radius:8px;padding:12px;text-align:center;border:1px solid var(--cab-border)}
.stat-n{font-size:22px;font-weight:600;color:var(--cab-accent)}
.stat-l{font-size:11px;color:var(--cab-text-sec);margin-top:2px}
.session-card{border:1px solid var(--cab-border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.session-card-head{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--cab-surface);cursor:pointer;transition:background .12s}
.session-card-head:hover{background:var(--cab-surface-alt)}
.session-date{font-size:13px;font-weight:500}
.session-motif{font-size:12px;color:var(--cab-text-sec)}
.session-card-body{padding:14px;border-top:1px solid var(--cab-border);display:none}
.session-card-body.open{display:block}
.session-body-tabs{display:flex;gap:0;margin-bottom:14px;border:1px solid var(--cab-border);border-radius:8px;overflow:hidden}
.stab{padding:6px 14px;font-size:12px;cursor:pointer;color:var(--cab-text-sec);background:var(--cab-surface);transition:background .12s,color .12s}
.stab:hover{background:var(--cab-surface-alt)}
.stab.active{background:var(--cab-accent);color:var(--cab-accent-fg)}
.obs-label{font-size:11px;color:var(--cab-text-sec);margin-bottom:3px;margin-top:10px}
.obs-label:first-child{margin-top:0}
.obs-text{font-size:13px;white-space:pre-wrap;line-height:1.5}
.pill-ex{display:inline-block;background:var(--cab-surface);border:1px solid var(--cab-border);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--cab-text-sec);margin:2px}
.delete-btn{background:none;border:none;color:var(--cab-text-dim);font-size:11px;cursor:pointer;padding:2px 6px;border-radius:4px;transition:color .12s}
.delete-btn:hover{color:var(--cab-accent)}
.no-sessions{text-align:center;padding:30px 0;color:var(--cab-text-sec);font-size:13px}
.modal-overlay{position:fixed;inset:0;background:var(--cab-overlay-bg);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal{background:var(--cab-bg);border-radius:12px;border:1px solid var(--cab-border);padding:22px;width:560px;max-width:92vw;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:15px;font-weight:600}
.btn-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--cab-text-sec);line-height:1;transition:color .12s}
.btn-close:hover{color:var(--cab-text)}
.internal-badge{display:inline-flex;align-items:center;gap:5px;background:#fff8e1;border:1px solid #ffe082;border-radius:6px;padding:5px 10px;font-size:11px;color:#7b5800;margin-bottom:14px}
.dark .internal-badge{background:#2a1f00;border-color:#5a4200;color:#f5c842}
.meridian-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.mer-item{border:1px solid var(--cab-border);border-radius:8px;padding:8px;background:var(--cab-surface)}
.mer-name{font-size:11px;font-weight:500;margin-bottom:4px}
.mer-select{width:100%;font-size:11px;padding:3px 5px;border-radius:4px;border:1px solid var(--cab-border);background:var(--cab-bg);color:var(--cab-text);font-family:inherit;outline:none}
.energie-chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500}
.e-plein{background:color-mix(in srgb,#be011d 10%,transparent);color:var(--cab-accent);border:1px solid color-mix(in srgb,#be011d 25%,transparent)}
.e-vide{background:#e8f4fd;color:#185FA5;border:1px solid #b5d4f4}
.e-stase{background:#fff8e1;color:#7b5800;border:1px solid #ffe082}
.e-ok{background:#eaf3de;color:#3B6D11;border:1px solid #c0dd97}
.e-nd{background:var(--cab-surface);color:var(--cab-text-sec);border:1px solid var(--cab-border)}
.dark .e-vide{background:#0d2136;color:#64b5f6;border-color:#1e4d7b}
.dark .e-stase{background:#2a1f00;border-color:#5a4200;color:#f5c842}
.dark .e-ok{background:#0d2306;color:#81c784;border-color:#2e5e1e}
.bilan-timeline{position:relative;padding-left:20px}
.bilan-timeline::before{content:'';position:absolute;left:6px;top:8px;bottom:8px;width:1px;background:var(--cab-border)}
.timeline-item{position:relative;margin-bottom:16px;padding:12px 14px;border:1px solid var(--cab-border);border-radius:8px;background:var(--cab-bg)}
.timeline-item::before{content:'';position:absolute;left:-17px;top:16px;width:8px;height:8px;border-radius:50%;background:var(--cab-accent);border:2px solid var(--cab-bg);box-shadow:0 0 0 1px var(--cab-accent)}
.timeline-date{font-size:11px;color:var(--cab-text-sec);margin-bottom:6px}
.timeline-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.timeline-synth{font-size:12px;line-height:1.5;color:var(--cab-text)}
.evolution-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.mer-legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}

.drive-bar{padding:8px 12px;border-top:1px solid var(--cab-border);background:var(--cab-surface)}
.drive-status{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--cab-text-sec)}
.drive-dot{width:7px;height:7px;border-radius:50%;background:var(--cab-border);flex-shrink:0}
.drive-dot.ok{background:#3B6D11}
.drive-dot.loading{background:#BA7517;animation:pulse 1s infinite}
.drive-dot.error{background:var(--cab-accent)}
.btn-drive{background:none;border:1px solid var(--cab-border);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;margin-left:auto;color:var(--cab-text);transition:background .12s}
.btn-drive:hover{background:var(--cab-surface-alt)}

.sidebar-nav{display:flex;border-bottom:1px solid var(--cab-border);background:var(--cab-bg)}
.snav{flex:1;padding:8px 4px;font-size:11px;font-weight:500;text-align:center;cursor:pointer;color:var(--cab-text-sec);border-bottom:2px solid transparent;transition:color .15s}
.snav:hover{color:var(--cab-text)}
.snav.active{color:var(--cab-accent);border-bottom-color:var(--cab-accent)}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--cab-border)}
.cal-nav{background:none;border:none;cursor:pointer;color:var(--cab-text-sec);font-size:16px;padding:2px 6px;border-radius:4px;transition:background .12s,color .12s}
.cal-nav:hover{background:var(--cab-surface-alt);color:var(--cab-text)}
.cal-month{font-size:13px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:8px 12px}
.cal-dow{font-size:10px;color:var(--cab-text-dim);text-align:center;padding:3px 0;font-weight:500}
.cal-day{font-size:11px;text-align:center;padding:5px 2px;border-radius:6px;cursor:default;min-height:26px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1px}
.cal-day.other{color:var(--cab-text-dim)}
.cal-day.today{background:color-mix(in srgb,var(--cab-accent) 12%,transparent);color:var(--cab-accent);font-weight:700}
.cal-day.has-session{cursor:pointer;font-weight:600}
.cal-day.has-session:not(.today){background:var(--cab-surface)}
.cal-day.has-session:hover{background:color-mix(in srgb,var(--cab-accent) 15%,transparent)}
.cal-pip{width:4px;height:4px;border-radius:50%;background:var(--cab-accent)}
.agenda-list{padding:12px 16px;overflow-y:auto;flex:1}
.agenda-group{margin-bottom:14px}
.agenda-date-header{font-size:11px;font-weight:600;color:var(--cab-accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.agenda-date-header::after{content:'';flex:1;height:1px;background:color-mix(in srgb,var(--cab-accent) 25%,transparent)}
.agenda-entry{display:flex;align-items:flex-start;gap:10px;padding:7px 10px;border-radius:8px;cursor:pointer;margin-bottom:4px;transition:background .12s}
.agenda-entry:hover{background:var(--cab-surface)}
.agenda-entry.past{opacity:.6}
.agenda-time{font-size:11px;color:var(--cab-text-dim);min-width:32px;margin-top:1px}
.agenda-client{font-size:13px;font-weight:500}
.agenda-motif{font-size:11px;color:var(--cab-text-sec)}
.agenda-dur{font-size:10px;padding:1px 6px;border-radius:20px;background:var(--cab-surface);border:1px solid var(--cab-border);color:var(--cab-text-sec);margin-left:auto;white-space:nowrap;flex-shrink:0}
.agenda-empty{text-align:center;padding:24px 0;font-size:12px;color:var(--cab-text-dim)}

.dark-toggle{background:none;border:1px solid var(--cab-border);border-radius:6px;padding:3px 7px;font-size:14px;cursor:pointer;color:var(--cab-text-sec);line-height:1;transition:background .12s}
.dark-toggle:hover{background:var(--cab-surface-alt)}

.sessions-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.grav-section{border:1px solid var(--cab-border);border-radius:8px;padding:14px;margin-bottom:20px;background:var(--cab-surface)}
.grav-section-title{font-size:11px;font-weight:600;color:var(--cab-text-sec);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.grav-dot{width:7px;height:7px;border-radius:50%;background:var(--cab-border);flex-shrink:0}
.grav-dot.found{background:#3B6D11}
.grav-dot.searching{background:#BA7517;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.grav-link{display:inline-flex;align-items:center;gap:6px;background:var(--cab-accent);color:var(--cab-accent-fg);text-decoration:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:500;margin-top:8px;transition:background .15s}
.grav-link:hover{background:var(--cab-accent-hover)}
.btn-grav{background:transparent;color:var(--cab-accent);border:1px solid var(--cab-accent);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;transition:background .15s,color .15s}
.btn-grav:hover{background:var(--cab-accent);color:var(--cab-accent-fg)}
.btn-grav:disabled{opacity:.4;cursor:not-allowed}
.grav-uuid-display{font-family:ui-monospace,monospace;font-size:11px;color:var(--cab-text-sec);background:var(--cab-bg);border:1px solid var(--cab-border);border-radius:4px;padding:3px 7px;margin-top:4px;display:inline-block}
.settings-btn{background:none;border:1px solid var(--cab-border);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--cab-text-sec);cursor:pointer;margin-left:auto;transition:background .12s}
.settings-btn:hover{background:var(--cab-surface-alt)}
</style>

<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-nav">
      <div class="snav active" id="snav_clients" onclick="setSidebarView('clients')">Clients</div>
      <div class="snav" id="snav_agenda" onclick="setSidebarView('agenda')">Agenda</div>
    </div>
    <div class="sidebar-head" id="sidebar_clients_head">
      <span class="sidebar-title">Clients</span>
      <button class="btn-add" onclick="openNewClient()">+ Nouveau</button>
    </div>

    </div>
    <div id="sidebar_clients_body">
    <div class="search-wrap">
      <input type="text" placeholder="Rechercher..." id="searchInput" oninput="renderList()">
    </div>
    <div class="client-list" id="clientList"></div>
    </div><!-- end sidebar_clients_body -->
    <div id="sidebar_agenda_body" style="display:none;flex:1;overflow:hidden;display:none;flex-direction:column" id="agendaPanel">
      <div id="agendaContent" style="flex:1;overflow-y:auto"></div>
    </div>
    <div class="drive-bar">
      <div class="drive-status" id="driveStatus">
        <div class="drive-dot" id="driveDot"></div>
        <span id="driveLabel">Bilans non synchronisés</span>
        <button class="btn-drive" id="driveBtn" onclick="driveAuth()" title="Accéder aux documents cliniques Google">Connecter Docs</button>
        <button class="btn-verif" id="verifBtn" onclick="runGlobalVerification()" title="Vérifier bilans et agenda" style="display:none">Vérifier</button>
        <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="Basculer thème sombre">🌙</button>
      </div>
    </div>
  </div>
  <div class="main" id="mainArea">
    <div class="empty-state">
      <div style="width:40px;height:40px;border-radius:50%;background:var(--cab-surface);display:flex;align-items:center;justify-content:center;font-size:18px">👤</div>
      <span style="font-size:13px">Sélectionnez un client</span>
      <span style="font-size:12px;color:var(--cab-text-sec)">ou créez un nouveau dossier</span>
    </div>
  </div>
</div>

<div id="modalOverlay" style="display:none" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<script>
let clients={},sessions={},activeId=null,activeTab='fiche',openSessions={};

const MERIDIANS=[
  {id:'P',name:'Poumon'},
  {id:'GI',name:'Gros Intestin'},
  {id:'E',name:'Estomac'},
  {id:'Rte',name:'Rate'},
  {id:'C',name:'Coeur'},
  {id:'IG',name:'Intestin Grêle'},
  {id:'V',name:'Vessie'},
  {id:'Rn',name:'Rein'},
  {id:'MC',name:'Maître Coeur'},
  {id:'TR',name:'Triple Réchauffeur'},
  {id:'VB',name:'Vésicule Biliaire'},
  {id:'F',name:'Foie'},
];

const STATES=[
  {val:'',label:'—'},
  {val:'plein',label:'Plein / Excès'},
  {val:'vide',label:'Vide / Insuffisance'},
  {val:'stase',label:'Stase / Blocage'},
  {val:'ok',label:'Harmonieux'},
];

const STATE_CLASS={plein:'e-plein',vide:'e-vide',stase:'e-stase',ok:'e-ok','':'e-nd'};



// ── Agenda global ─────────────────────────────────────────────────────────
let sidebarView = 'clients';
let agendaMonth = new Date();

function setSidebarView(view){
  sidebarView = view;
  document.getElementById('snav_clients').classList.toggle('active', view==='clients');
  document.getElementById('snav_agenda').classList.toggle('active', view==='agenda');

  const clientsHead = document.getElementById('sidebar_clients_head');
  const clientsBody = document.getElementById('sidebar_clients_body');
  const agendaPanel = document.getElementById('sidebar_agenda_body');

  if(view==='clients'){
    if(clientsHead) clientsHead.style.display='';
    if(clientsBody) clientsBody.style.display='';
    if(agendaPanel) agendaPanel.style.display='none';
  } else {
    if(clientsHead) clientsHead.style.display='none';
    if(clientsBody) clientsBody.style.display='none';
    if(agendaPanel){ agendaPanel.style.display='flex'; agendaPanel.style.flexDirection='column'; }
    renderAgenda();
  }
}

function renderAgenda(){
  const el = document.getElementById('agendaContent');
  if(!el) return;

  const y = agendaMonth.getFullYear();
  const m = agendaMonth.getMonth();

  // Collecter toutes les séances avec info client
  const allSessions = [];
  Object.entries(sessions).forEach(([cid, ss])=>{
    const client = clients[cid];
    if(!client) return;
    ss.forEach(s=>{
      if(s.date) allSessions.push({...s, cid, clientName: client.first_name+' '+client.last_name});
    });
  });

  // Index par date YYYY-MM-DD
  const byDate = {};
  allSessions.forEach(s=>{
    const d = s.date.slice(0,10);
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(s);
  });

  // ── Mini calendrier ───────────────────────────────────────────────────
  const today = new Date().toISOString().slice(0,10);
  const firstDay = new Date(y, m, 1);
  const lastDay  = new Date(y, m+1, 0);
  const startDow = (firstDay.getDay()+6)%7; // Lundi=0
  const daysInMonth = lastDay.getDate();
  const monthLabel = firstDay.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});

  const dows = ['L','M','M','J','V','S','D'];
  let calCells = dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');

  // Cases vides avant le 1er
  for(let i=0;i<startDow;i++) calCells += '<div class="cal-day other"></div>';

  for(let d=1;d<=daysInMonth;d++){
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasSess = !!byDate[dateStr];
    const isToday = dateStr===today;
    let cls = 'cal-day';
    if(isToday) cls+=' today';
    if(hasSess) cls+=' has-session';
    const pip = hasSess ? '<div class="cal-pip"></div>' : '';
    const click = hasSess ? `onclick="scrollToDate('${dateStr}')"` : '';
    calCells += `<div class="${cls}" ${click}>${d}${pip}</div>`;
  }

  // Cases vides après le dernier
  const endDow = (lastDay.getDay()+6)%7;
  for(let i=endDow+1;i<7;i++) calCells += '<div class="cal-day other"></div>';

  // ── Liste des séances du mois ─────────────────────────────────────────
  const monthPrefix = `${y}-${String(m+1).padStart(2,'0')}`;
  const monthDates = Object.keys(byDate)
    .filter(d=>d.startsWith(monthPrefix))
    .sort();

  const now = today;
  let listHtml = '';
  if(!monthDates.length){
    listHtml = '<div class="agenda-empty">Aucune séance ce mois-ci</div>';
  } else {
    monthDates.forEach(dateStr=>{
      const dateObj = new Date(dateStr+'T12:00:00');
      const label = dateObj.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
      const isPast = dateStr < now;
      listHtml += `<div class="agenda-group" id="date_${dateStr}">
        <div class="agenda-date-header">${label}</div>
        ${byDate[dateStr].map(s=>`
          <div class="agenda-entry${isPast?' past':''}" onclick="goToClient('${s.cid}')">
            <div>
              <div class="agenda-client">${esc(s.clientName)}</div>
              ${s.motif?`<div class="agenda-motif">${esc(s.motif)}</div>`:''}
            </div>
            ${s.duree?`<div class="agenda-dur">${s.duree} min</div>`:''}
          </div>`).join('')}
      </div>`;
    });
  }

  el.innerHTML = `
    <div class="cal-header">
      <button class="cal-nav" onclick="changeAgendaMonth(-1)">‹</button>
      <span class="cal-month">${monthLabel.charAt(0).toUpperCase()+monthLabel.slice(1)}</span>
      <button class="cal-nav" onclick="changeAgendaMonth(1)">›</button>
    </div>
    <div class="cal-grid">${calCells}</div>
    <div style="border-top:0.5px solid #e2e2e2;padding:10px 16px 4px;font-size:11px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.5px">Séances du mois</div>
    <div class="agenda-list">${listHtml}</div>`;
}

let driveToken = null;
let gapiReady = false;

function initGapi(){
  gapi.load('client', async ()=>{
    await gapi.client.init({});
    await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');
    gapiReady = true;
    const cid = localStorage.getItem('gdrive_client_id');
    if(cid) initTokenClient(cid);
  });
}

function initTokenClient(clientId){
  window._tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/documents',
    callback: async (resp)=>{
      if(resp.error){ setDriveStatus('error','Erreur d\'authentification'); return; }
      driveToken = resp.access_token;
      setDriveStatus('ok','Google Docs connecté');
      document.getElementById('driveBtn').textContent='Déconnecter Docs';
      document.getElementById('driveBtn').onclick=driveSignOut;
      renderList();
    }
  });
}

function driveAuth(){
  const cid = localStorage.getItem('gdrive_client_id');
  if(!cid){ openDriveSettings(); return; }
  if(!window._tokenClient) initTokenClient(cid);
  setDriveStatus('loading','Connexion…');
  window._tokenClient.requestAccessToken({prompt:''});
}

function driveSignOut(){
  if(driveToken) google.accounts.oauth2.revoke(driveToken);
  driveToken=null; driveFileId=null;
  setDriveStatus('','Non connecté');
  document.getElementById('driveBtn').textContent='Connecter Drive';
  document.getElementById('driveBtn').onclick=driveAuth;
  clients={}; sessions={}; renderList();
}

function setDriveStatus(state, label){
  const dot=document.getElementById('driveDot');
  const lbl=document.getElementById('driveLabel');
  if(dot) dot.className='drive-dot'+(state?' '+state:'');
  if(lbl) lbl.textContent=label;
}

async function driveGet(path, params=''){
  const r=await fetch('https://www.googleapis.com/drive/v3/'+path+'?'+params,{
    headers:{'Authorization':'Bearer '+driveToken}
  });
  if(r.status===401){setDriveStatus('error','Session expirée — reconnectez');return null;}
  return r.ok ? r.json() : null;
}

async function createDoc(name, content){
  if(!driveToken){alert('Connectez Google Docs d\'abord (bouton en bas de la liste).');return null;}
  setDriveStatus('loading','Création du document…');
  try{
    // 1. Créer le fichier Google Doc vide
    const r1=await fetch('https://www.googleapis.com/drive/v3/files',{
      method:'POST',
      headers:{'Authorization':'Bearer '+driveToken,'Content-Type':'application/json'},
      body:JSON.stringify({name,mimeType:'application/vnd.google-apps.document'})
    });
    if(!r1.ok) throw new Error('Création échouée');
    const doc=await r1.json();

    // 2. Insérer le contenu template via Docs API
    await fetch('https://docs.googleapis.com/v1/documents/'+doc.id+':batchUpdate',{
      method:'POST',
      headers:{'Authorization':'Bearer '+driveToken,'Content-Type':'application/json'},
      body:JSON.stringify({requests:[{insertText:{location:{index:1},text:content}}]})
    });

    setDriveStatus('ok','Document créé');
    return doc.id;
  }catch(e){
    setDriveStatus('error','Erreur : '+e.message);
    return null;
  }
}

async function searchGravContact(clientId){
  const c=clients[clientId];
  const dotEl=document.getElementById('grav_dot_'+clientId);
  const statusEl=document.getElementById('grav_status_'+clientId);
  const btnEl=document.getElementById('grav_btn_'+clientId);
  if(dotEl)dotEl.className='grav-dot searching';
  if(statusEl)statusEl.textContent='Recherche en cours…';
  if(btnEl)btnEl.disabled=true;

  const params=new URLSearchParams();
  if(c.email)params.set('email',c.email);
  params.set('first_name',c.first_name||'');
  params.set('last_name',c.last_name||'');

  try{
    const res=await fetch('/api/contacts/search?'+params,{headers:{'Accept':'application/json'}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(data.found&&data.uuid){
      clients[clientId].grav_uuid=data.uuid;
      if(data.rdv)clients[clientId].grav_rdv=data.rdv;
      await save();
      renderMain();
    } else {
      if(dotEl)dotEl.className='grav-dot';
      if(statusEl)statusEl.textContent='Aucun contact trouvé sur Grav';
      if(btnEl)btnEl.disabled=false;
    }
  }catch(e){
    if(dotEl)dotEl.className='grav-dot';
    if(statusEl)statusEl.textContent='Erreur : '+e.message;
    if(btnEl)btnEl.disabled=false;
  }
}

    ${!s.observations&&!s.exercices&&!s.prochaine?'<div style="font-size:12px;color:var(--color-text-secondary,#666)">Aucune note clinique</div>':''}`;
}

function renderSessionEnergetique(s){
  const b=s.bilan||{};
  const hasMer=MERIDIANS.some(m=>b[m.id]);
  return `
    <div class="internal-badge">Usage interne — non communiqué au client</div>
    <div class="section-label">État des méridiens</div>
    ${!hasMer&&!b.synthese_mtc?'<div style="font-size:12px;color:var(--color-text-secondary,#666);margin-bottom:12px">Aucun bilan enregistré pour cette séance</div>':''}
    ${hasMer?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px">
      ${MERIDIANS.filter(m=>b[m.id]).map(m=>`
        <span style="font-size:12px;color:var(--color-text-secondary,#666)">${m.name} : </span>
        <span class="energie-chip ${STATE_CLASS[b[m.id]||'']}">${STATES.find(s=>s.val===b[m.id])?.label||'—'}</span>
      `).join('')}
    </div>`:''}
    ${b.element_dominant?`<div class="obs-label">Élément dominant</div><div class="obs-text" style="margin-bottom:8px">${esc(b.element_dominant)}</div>`:''}
    ${b.synthese_mtc?`<div class="obs-label">Synthèse MTC</div><div class="obs-text" style="margin-bottom:8px">${esc(b.synthese_mtc)}</div>`:''}
    ${b.prise_en_charge?`<div class="obs-label">Points / zones travaillés</div><div class="obs-text" style="margin-bottom:8px">${esc(b.prise_en_charge)}</div>`:''}
    ${b.evolution?`<div class="obs-label">Évolution perçue vs séance précédente</div><div class="obs-text">${esc(b.evolution)}</div>`:''}
  `;
}

function setSessionTab(sid,tab){
  openSessions[sid+'_tab']=tab;
  const el=document.getElementById('stab_'+sid);
  if(!el)return;
  const s=(sessions[activeId]||[]).find(x=>x.id===sid);
  if(!s)return;
  el.innerHTML=tab==='clinique'?renderSessionClinique(s):renderSessionEnergetique(s);
  document.querySelectorAll(`#sb_${sid} .stab`).forEach((el,i)=>{
    el.classList.toggle('active',(i===0&&tab==='clinique')||(i===1&&tab==='energetique'));
  });
}

function toggleSession(id){
  openSessions[id]=!openSessions[id];
  const el=document.getElementById('sb_'+id);
  if(el)el.classList.toggle('open',!!openSessions[id]);
}

function renderBilanEvolution(){
  const ss=(sessions[activeId]||[]).filter(s=>s.bilan&&Object.keys(s.bilan).length>0).sort((a,b)=>a.date.localeCompare(b.date));
  return `
    <div class="evolution-header">
      <div class="section-label" style="margin:0">Évolution énergétique</div>
      <div class="internal-badge" style="margin:0">Usage interne uniquement</div>
    </div>
    ${!ss.length?`<div class="no-sessions">Aucun bilan énergétique enregistré.<br><span style="font-size:12px">Ajoutez un bilan dans l'onglet Séances → sous-onglet "Bilan énergétique".</span></div>`:`
    <div class="mer-legend">
      ${Object.entries(STATE_CLASS).filter(([k])=>k).map(([k,cls])=>`<span class="energie-chip ${cls}">${STATES.find(s=>s.val===k)?.label||k}</span>`).join('')}
    </div>
    <div class="bilan-timeline">
      ${ss.map(s=>{
        const b=s.bilan||{};
        const activeMer=MERIDIANS.filter(m=>b[m.id]);
        return `<div class="timeline-item">
          <div class="timeline-date">${s.date}${s.motif?' · '+esc(s.motif):''}</div>
          ${activeMer.length?`<div class="timeline-chips">
            ${activeMer.map(m=>`<span class="energie-chip ${STATE_CLASS[b[m.id]||'']}" title="${m.name}">${m.id} <span style="font-weight:500">${m.name}</span></span>`).join('')}
          </div>`:''}
          ${b.element_dominant?`<div style="font-size:11px;color:var(--color-text-secondary,#666);margin-bottom:4px">Élément : <strong>${esc(b.element_dominant)}</strong></div>`:''}
          ${b.synthese_mtc?`<div class="timeline-synth">${esc(b.synthese_mtc)}</div>`:''}
          ${b.evolution?`<div style="font-size:12px;color:var(--color-text-secondary,#666);margin-top:6px;font-style:italic">${esc(b.evolution)}</div>`:''}
        </div>`;
      }).join('')}
    </div>`}`;
}

function openNewSession(){
  const today=new Date().toISOString().slice(0,10);
  showModal(`
    <div class="modal-head">
      <span class="modal-title">Nouvelle séance</span>
      <button class="btn-close" onclick="closeModal()">×</button>
    </div>

    <div style="display:flex;gap:0;margin-bottom:18px;border:0.5px solid var(--color-border-tertiary,#e2e2e2);border-radius:8px;overflow:hidden">
      <div id="mtab_clinique" class="stab active" onclick="switchModalTab('clinique')" style="flex:1;text-align:center">Clinique</div>
      <div id="mtab_energetique" class="stab" onclick="switchModalTab('energetique')" style="flex:1;text-align:center">Bilan énergétique</div>
    </div>

    <div id="modal_clinique">
      <div class="field-grid">
        <div class="field"><label>Date</label><input id="s_date" type="date" value="${today}"></div>
        <div class="field"><label>Durée (min)</label><input id="s_duree" type="number" placeholder="60"></div>
        <div class="field field-full"><label>Motif de la séance</label><input id="s_motif" placeholder="ex: douleur lombaire, stress..."></div>
        <div class="field field-full"><label>Observations cliniques</label><textarea id="s_obs" placeholder="Zones travaillées, réactions, état général..."></textarea></div>
        <div class="field field-full"><label>Exercices transmis (séparés par virgule)</label><input id="s_ex" placeholder="ex: étirement mollet, auto-massage balle"></div>
        <div class="field field-full"><label>Intention pour la prochaine séance</label><input id="s_prochaine"></div>
      </div>
    </div>

    <div id="modal_energetique" style="display:none">
      <div class="internal-badge">Usage interne — non communiqué au client</div>
      <div class="section-label">État des méridiens</div>
      <div class="meridian-grid">
        ${MERIDIANS.map(m=>`
          <div class="mer-item">
            <div class="mer-name">${m.name}</div>
            <select class="mer-select" id="mer_${m.id}">
              ${STATES.map(st=>`<option value="${st.val}">${st.label}</option>`).join('')}
            </select>
          </div>`).join('')}
      </div>
      <div class="field-grid">
        <div class="field"><label>Élément dominant</label>
          <select id="s_element">
            <option value="">—</option>
            <option>Bois</option><option>Feu</option><option>Terre</option><option>Métal</option><option>Eau</option>
          </select>
        </div>
        <div class="field"><label>Évolution vs séance précédente</label><input id="s_evolution" placeholder="Amélioration, stagnation..."></div>
        <div class="field field-full"><label>Synthèse MTC</label><textarea id="s_synthese_mtc" placeholder="Lecture énergétique globale, déséquilibres principaux..."></textarea></div>
        <div class="field field-full"><label>Points / zones travaillés</label><textarea id="s_prise_en_charge" placeholder="Points utilisés, techniques appliquées..."></textarea></div>
      </div>
    </div>

    <button class="btn-save" onclick="saveSession()">Enregistrer la séance</button>`);
}

function switchModalTab(tab){
  document.getElementById('modal_clinique').style.display=tab==='clinique'?'block':'none';
  document.getElementById('modal_energetique').style.display=tab==='energetique'?'block':'none';
  document.getElementById('mtab_clinique').classList.toggle('active',tab==='clinique');
  document.getElementById('mtab_energetique').classList.toggle('active',tab==='energetique');
}

function saveSession(){
  if(!sessions[activeId])sessions[activeId]=[];
  const bilan={};
  MERIDIANS.forEach(m=>{const v=document.getElementById('mer_'+m.id)?.value;if(v)bilan[m.id]=v;});
  const el=document.getElementById('s_element')?.value;if(el)bilan.element_dominant=el;
  const ev=document.getElementById('s_evolution')?.value;if(ev)bilan.evolution=ev;
  const sy=document.getElementById('s_synthese_mtc')?.value;if(sy)bilan.synthese_mtc=sy;
  const pc=document.getElementById('s_prise_en_charge')?.value;if(pc)bilan.prise_en_charge=pc;
  sessions[activeId].push({
    id:uid(),
    date:document.getElementById('s_date')?.value||'',
    duree:document.getElementById('s_duree')?.value||'',
    motif:document.getElementById('s_motif')?.value||'',
    observations:document.getElementById('s_obs')?.value||'',
    exercices:document.getElementById('s_ex')?.value||'',
    prochaine:document.getElementById('s_prochaine')?.value||'',
    bilan:Object.keys(bilan).length?bilan:null,
  });
  save();closeModal();renderList();renderMain();
}

function deleteSession(sid){
  if(!confirm('Supprimer cette séance ?'))return;
  sessions[activeId]=(sessions[activeId]||[]).filter(s=>s.id!==sid);
  save();renderMain();
}

function deleteClient(){
  if(!confirm('Supprimer ce dossier client ?'))return;
  delete clients[activeId];delete sessions[activeId];
  activeId=null;save();renderList();renderMain();
}

function openNewClient(){
  showModal(`
    <div class="modal-head">
      <span class="modal-title">Nouveau client</span>
      <button class="btn-close" onclick="closeModal()">×</button>
    </div>
    <div class="field-grid">
      <div class="field"><label>Prénom *</label><input id="nc_prenom"></div>
      <div class="field"><label>Nom *</label><input id="nc_nom"></div>
      <div class="field"><label>Téléphone</label><input id="nc_tel"></div>
      <div class="field"><label>Email</label><input id="nc_email"></div>
      <div class="field field-full"><label>Motif principal</label><input id="nc_motif"></div>
    </div>
    <button class="btn-save" onclick="createClient()">Créer le dossier</button>`);
}

function createClient(){
  const p=document.getElementById('nc_prenom').value.trim(),n=document.getElementById('nc_nom').value.trim();
  if(!p||!n){alert('Prénom et nom requis');return;}
  const id=uid();
  clients[id]={first_name:p,last_name:n,phone:document.getElementById('nc_tel').value,email:document.getElementById('nc_email').value,motif:document.getElementById('nc_motif').value,created:Date.now()};
  save();closeModal();selectClient(id);
}

function showModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modalOverlay').style.display='flex';}
function closeModal(){document.getElementById('modalOverlay').style.display='none';}

// ── Init Google API
if(typeof gapi!=="undefined")window.addEventListener("load",initGapi);
else document.querySelector("script[src*=\"apis.google.com\"]").addEventListener("load",initGapi);

// ── PWA Service Worker ───────────────────────────────────────────────────────
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/cabinet/sw.js').catch(()=>{});
}

// ── Chargement initial des données depuis Grav ─────────────────────────────
async function load(){
  try{
    const r = await fetch('/api/cabinet/data');
    if(!r.ok){ console.error('Erreur chargement données',r.status); return; }
    const data = await r.json();
    clients  = data.clients  ?? {};
    sessions = data.sessions ?? {};
    renderList();
    if(sidebarView==='agenda') renderAgenda();
  }catch(e){
    console.error('Erreur chargement données',e);
  }
}

// load() est appelé après auth Drive (ou au démarrage si déjà connecté)
window.addEventListener("load", ()=>{
  // Dark mode: follow system preference, allow manual override
  const saved = localStorage.getItem('cab-dark');
  const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = saved !== null ? saved === '1' : prefersDark;
  applyDark(isDark);
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (localStorage.getItem('cab-dark') === null) applyDark(e.matches);
  });
  // Charger Grav immédiatement, Drive mergera les bilans après auth
  load();
});

function applyDark(on) {
  document.documentElement.classList.toggle('dark', on);
  const btn = document.getElementById('darkToggle');
  if (btn) btn.textContent = on ? '☀️' : '🌙';
}
function toggleDark() {
  const isDark = document.documentElement.classList.contains('dark');
  localStorage.setItem('cab-dark', isDark ? '0' : '1');
  applyDark(!isDark);
}
</script>
</html>
